<!DOCTYPE html>
<html lang="es">
<head>

    fbq('init', '1197236062271546'); // ESTE ES TU ID CORRECTO
    fbq('track', 'PageView');
    fbq('track', 'InitiateCheckout', {
        content_name: 'Curso Aprende a Tatuar en 10 Días',
        value: 30000.00,
        currency: 'ARS'

    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1197236062271546&ev=PageView&noscript=1"
    /></noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finalizar Compra | Broderacademy</title>
    
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Poppins', 'sans-serif'], 
                        black: ['Archivo Black', 'sans-serif'] 
                    },
                    colors: { 
                        dark: '#0a0a0a', 
                        accent: '#c62828', 
                        card: '#141414' 
                    }
                }
            }
        }
    </script>

    <style>
        html, body { 
            max-width: 100vw; 
            overflow-x: hidden; 
            position: relative;
            touch-action: pan-y;
            background-color: #0a0a0a;
            color: #ffffff;
        }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .font-black-logo { font-family: 'Archivo Black', sans-serif; }
    </style>
</head>
<body class="antialiased font-sans">

    <nav class="py-3 border-b border-white/5 flex justify-center bg-dark/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-base font-black-logo italic uppercase">
            BRODER<span class="text-accent">ACADEMY</span> <span class="text-gray-500 font-light text-[9px] ml-2 tracking-widest">| CHECKOUT</span>
        </h1>
    </nav>

    <main class="max-w-5xl mx-auto py-6 px-6 grid md:grid-cols-12 gap-6 items-stretch">
        
        <div class="md:col-span-7 flex flex-col gap-6">
            <section class="bg-card p-6 border border-white/5 shadow-2xl flex-1 flex flex-col justify-center">
                <h2 class="font-black uppercase italic text-xs tracking-widest mb-6 text-accent">1. Tus Datos de Acceso</h2>
                <div class="grid gap-5">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2 tracking-widest italic">Nombre Completo</label>
                        <input id="nombre" type="text" placeholder="EJ: MARIANO CABRAL" class="w-full bg-dark border border-white/10 p-4 text-sm focus:border-accent outline-none transition uppercase italic font-bold tracking-tight text-white">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2 tracking-widest italic">Email de entrega</label>
                        <input id="email" type="email" placeholder="TU@EMAIL.COM" class="w-full bg-dark border border-white/10 p-4 text-sm focus:border-accent outline-none transition italic font-bold text-accent">
                    </div>
                </div>
            </section>

            <section class="bg-card p-6 border border-white/5">
                <h2 class="font-black uppercase italic text-xs tracking-widest mb-6 text-accent">2. Método de Pago</h2>
                <label class="flex items-center justify-between p-5 border-2 border-accent bg-accent/5 cursor-pointer hover:bg-accent/10 transition-all">
                    <div class="flex items-center gap-4">
                        <input type="radio" name="pago" checked class="w-5 h-5 accent-accent">
                        <span class="font-black uppercase italic text-xs tracking-widest">Mercado Pago / Tarjetas</span>
                    </div>
                    <img src="img/logo-mp.png" class="h-10 object-contain" alt="Mercado Pago">
                </label>
            </section>
        </div>

        <div class="md:col-span-5">
            <div class="bg-card border border-white/5 p-6 h-full flex flex-col justify-between shadow-2xl">
                <div>
                    <h2 class="font-black uppercase italic text-xs tracking-widest mb-6">Tu Pedido</h2>
                    
                    <div class="flex items-center gap-5 pb-6 border-b border-white/5">
                        <img src="img/libro-maestro.png" class="w-24 h-28 object-contain drop-shadow-[0_0_20px_rgba(198,40,40,0.4)]" alt="Libro">
                        <div>
                            <h3 class="font-black uppercase italic text-[14px] leading-tight text-white mb-1">Aprende a tatuar en 10 días</h3>
                            <p class="text-[11px] text-accent font-black tracking-widest uppercase italic leading-none">Pack Master + 3 Bonos</p>
                        </div>
                    </div>

                    <div class="py-6 space-y-4">
                        <div class="flex justify-between text-[10px] uppercase italic text-gray-500 font-bold tracking-tighter">
                            <span>Precio de lista</span>
                            <span class="line-through">$90.000</span>
                        </div>
                        <div class="flex justify-between text-[11px] uppercase italic text-green-500 font-black tracking-tighter">
                            <span>Promo Lanzamiento (-70%)</span>
                            <span>-$60.000</span>
                        </div>
                        <div class="flex justify-between font-black uppercase italic text-2xl pt-4 border-t border-white/5 tracking-tighter">
                            <span>Total</span>
                            <span class="text-accent font-black">$30.000</span>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button id="btn-finalizar" class="w-full bg-accent hover:bg-red-800 text-white py-5 font-black uppercase italic text-sm tracking-[0.1em] shadow-xl shadow-accent/30 transition-all hover:scale-[1.02] block text-center rounded-sm">
                        FINALIZAR COMPRA 🚀
                    </button>
                    <p class="text-[9px] text-center text-gray-600 uppercase font-bold tracking-[0.2em] italic mt-4">🔒 Transacción Segura</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 opacity-20 text-[8px] uppercase tracking-[0.5em] font-bold italic">
        Broderacademy &copy; 2026 • Moreno, Bs.As.
    </footer>

    <script>
        const btn = document.getElementById('btn-finalizar');
        const inputNombre = document.getElementById('nombre');
        const inputEmail = document.getElementById('email');
        const linkPago = "https://mpago.la/25a6d4D";

        // --- TRUCO LOCALSTORAGE Y RECUPERACIÓN ---
        
        // Al cargar la página, verificamos si ya había escrito algo antes
        window.onload = function() {
            const nombreGuardado = localStorage.getItem('ba_nombre');
            const emailGuardado = localStorage.getItem('ba_email');
            
            if (nombreGuardado) inputNombre.value = nombreGuardado;
            if (emailGuardado) inputEmail.value = emailGuardado;
        };

        // Guardamos cada vez que escriben una letra (para capturar el abandono)
        inputNombre.addEventListener('input', () => {
            localStorage.setItem('ba_nombre', inputNombre.value);
        });

        inputEmail.addEventListener('input', () => {
            localStorage.setItem('ba_email', inputEmail.value);
        });

        btn.addEventListener('click', () => {
            inputNombre.classList.remove('border-accent');
            inputEmail.classList.remove('border-accent');

            const nombreValido = inputNombre.value.trim() !== "";
            const emailValido = inputEmail.checkValidity() && inputEmail.value !== "";

            if (!nombreValido || !emailValido) {
                alert("⚠️ Broder, completá tu nombre y un email válido para recibir el curso.");
                if (!nombreValido) inputNombre.classList.add('border-accent');
                if (!emailValido) inputEmail.classList.add('border-accent');
                return;
            }

            // Evento de Conversión (Opcional si usas Purchase en gracias.html)
            fbq('track', 'AddPaymentInfo');

            // Limpiamos storage al finalizar con éxito
            localStorage.removeItem('ba_nombre');
            localStorage.removeItem('ba_email');

            window.location.href = linkPago;
        });
    </script>
</body>
</html>
